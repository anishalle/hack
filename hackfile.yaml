project: hackutd
version: "1"

environments:
  dev:
    deploy:
      provider: cloud-run
      project: hackutd-gcp
      region: us-central1
      service: hackutd-api-dev
      dockerfile: ./Dockerfile
    db:
      provider: neon
      project_id: aged-frost-12345
      branch: dev
    auth:
      provider: supertokens
      connection_uri: https://dev-xxxxx.supertokens.io

  prod:
    deploy:
      provider: cloud-run
      project: hackutd-gcp
      region: us-central1
      service: hackutd-api-prod
      dockerfile: ./Dockerfile
    db:
      provider: neon
      project_id: aged-frost-12345
      branch: main
    auth:
      provider: supertokens
      connection_uri: https://prod-xxxxx.supertokens.io

secrets:
  provider: google-secret-manager
  project: hackutd-gcp
  prefix: hackutd
